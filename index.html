<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>白河愁 · 提问箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #7C5CFC;
      --primary-light: #EEEBFF;
      --primary-dark: #5B3FCF;
      --primary-glow: #9B7FFF;
      --bg: #F8F7FA;
      --card-bg: #FFFFFF;
      --card-shadow: 0 2px 16px rgba(0,0,0,0.06);
      --text: #1F1F2D;
      --text-light: #6B7280;
      --text-muted: #9CA3AF;
      --border: #E8E6ED;
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      --nav-height: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --gradient-1: linear-gradient(135deg, #F5E8FF 0%, #E8F0FF 100%);
      --gradient-2: linear-gradient(135deg, #FFF0E8 0%, #FFE8F0 100%);
      --gradient-3: linear-gradient(135deg, #E8FFEE 0%, #E8F5FF 100%);
      --gradient-4: linear-gradient(135deg, #F0E8FF 0%, #FFE8F5 100%);
      --gradient-midnight: linear-gradient(135deg, #E8EFFF 0%, #F5E8FF 100%);
    }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 12px);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% -10%, rgba(124,92,252,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }
    a { color: var(--primary); text-decoration: none; }
    input, textarea, button { font-family: var(--font); outline: none; border: none; }
    ::selection { background: var(--primary-light); color: var(--primary-dark); }
    ::placeholder { color: var(--text-muted); opacity: 1; }
    input, textarea, select { color: var(--text); }

    /* ===== Page Container ===== */
    .page { display: none; max-width: 480px; margin: 0 auto; padding: 0 16px; }
    .page.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== Bottom Nav ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-height) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 1000;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      transition: color 0.2s; padding: 4px 12px; user-select: none;
    }
    .nav-item .nav-icon { font-size: 22px; line-height: 1; }
    .nav-item.active { color: var(--primary); }
    .nav-item:active { opacity: 0.6; }

    /* ===== Header ===== */
    .page-header {
      text-align: center; padding: 32px 0 24px;
    }
    .page-header .avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .page-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { font-size: 14px; color: var(--text-light); }

    /* ===== Ask Page ===== */
    .ask-section { margin-bottom: 24px; }
    .ask-card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--card-shadow); padding: 24px;
      border: 1px solid var(--border);
    }
    .ask-card label {
      display: block; font-size: 13px; font-weight: 500; color: var(--text-light);
      margin-bottom: 8px;
    }
    .ask-card textarea {
      width: 100%; min-height: 120px; padding: 14px 16px;
      font-size: 15px; line-height: 1.6; color: var(--text);
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm);
      resize: vertical; transition: all 0.2s;
    }
    .ask-card textarea:focus { background: #F0EEF5; border-color: var(--primary); }
    .ask-card textarea::placeholder { color: var(--text-muted); }
    .ask-card input[type="text"] {
      width: 100%; padding: 12px 16px; font-size: 14px;
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm);
      margin-top: 12px; transition: all 0.2s;
    }
    .ask-card input[type="text"]:focus { background: #F0EEF5; border-color: var(--primary); }
    .ask-card input[type="text"]::placeholder { color: var(--text-muted); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
      background: var(--primary); color: white; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s; margin-top: 14px;
      border: none;
    }
    .btn:hover { opacity: 0.9; box-shadow: 0 4px 16px rgba(124,92,252,0.2); }
    .btn:active { transform: scale(0.98); opacity: 0.8; }
    .btn-secondary {
      background: var(--primary-light); color: var(--primary-dark);
    }
    .btn-secondary:hover { box-shadow: 0 4px 12px rgba(124,92,252,0.1); }
    .btn-outline {
      background: transparent; border: 1.5px solid var(--border); color: var(--text-light);
    }
    .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-outline:active { background: #F3F1F8; }
    .btn-sm {
      padding: 8px 16px; font-size: 13px; width: auto; border-radius: 8px;
    }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1F1F2D; color: white; padding: 10px 24px;
      border-radius: 12px; font-size: 14px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      z-index: 9999; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ===== Recent Questions (Public) ===== */
    .recent-title { font-size: 14px; font-weight: 600; color: var(--text-light); margin-bottom: 12px; }
    .public-q-item {
      background: var(--card-bg); border-radius: var(--radius-sm);
      padding: 14px 16px; margin-bottom: 10px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(0,0,0,0.15);
    }
    .public-q-item .q-text { font-size: 14px; line-height: 1.6; margin-bottom: 6px; }
    .public-q-item .q-meta { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }
    .public-q-item .q-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 6px;
      background: var(--primary-light); color: var(--primary-dark);
    }
    .public-q-item .q-tag.answered { background: #ECFDF5; color: #059669; }

    /* ===== Admin Page ===== */
    .admin-login {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 70vh; text-align: center; padding: 40px 20px;
    }
    .admin-login .lock-icon { font-size: 48px; margin-bottom: 16px; }
    .admin-login h2 { font-size: 20px; margin-bottom: 8px; }
    .admin-login p { font-size: 14px; color: var(--text-light); margin-bottom: 24px; }
    .admin-login input {
      width: 100%; max-width: 280px; padding: 14px 16px; font-size: 16px;
      text-align: center; background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm); color: var(--text);
      margin-bottom: 12px; letter-spacing: 4px;
    }
    .admin-login input:focus { border-color: var(--primary); background: #F0EEF5; }
    .admin-login .btn { max-width: 280px; }

    .admin-dashboard { display: none; }
    .admin-dashboard.active { display: block; }
    .stats-row {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      flex: 1; background: var(--card-bg); border-radius: var(--radius-sm);
      padding: 14px; text-align: center;
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
    }
    .stat-card .num { font-size: 26px; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

    .admin-tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .admin-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500;
      border-radius: 8px; cursor: pointer; background: #F0EEF5; color: var(--text-muted);
      transition: all 0.2s;
    }
    .admin-tab.active { background: var(--primary); color: white; }

    .q-list { }
    .q-item {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      cursor: pointer; transition: all 0.2s;
    }
    .q-item:active { transform: scale(0.99); }
    .q-item .q-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;
    }
    .q-item .q-status {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    }
    .q-item .q-status.pending { background: #FEF3C7; color: #D97706; }
    .q-item .q-status.answered { background: #ECFDF5; color: #059669; }
    .q-item .q-text { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .q-item .q-name { font-size: 12px; color: var(--text-muted); }
    .q-item .q-time { font-size: 12px; color: var(--text-muted); }
    .q-item .q-actions {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .q-item.expanded .q-actions { display: block; }
    .q-item .q-actions textarea {
      width: 100%; min-height: 80px; padding: 12px; font-size: 14px; line-height: 1.6;
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm); resize: vertical; color: var(--text);
      margin-bottom: 10px;
    }
    .q-item .q-actions textarea:focus { border-color: var(--primary); background: #F0EEF5; }
    .q-item .q-actions .btn-row {
      display: flex; gap: 8px;
    }
    .q-item .q-actions .btn-row .btn { margin-top: 0; flex: 1; }
    .q-item .q-answer {
      display: none; margin-top: 10px; padding: 12px;
      background: var(--primary-light); border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 14px; line-height: 1.6; color: var(--text);
    }
    .q-item.answered .q-answer { display: block; }
    .q-item .q-answer-label { font-size: 11px; color: var(--primary-dark); font-weight: 500; margin-bottom: 4px; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ===== Card Generator ===== */
    .card-controls { margin-bottom: 20px; }
    .card-controls select, .card-controls input[type="color"] {
      width: 100%; padding: 10px 14px; font-size: 14px; font-family: var(--font);
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm); margin-bottom: 10px; color: var(--text);
      cursor: pointer;
    }
    .card-controls select:focus { border-color: var(--primary); }
    .card-controls .color-row {
      display: flex; gap: 10px; align-items: center;
    }
    .card-controls .color-row input[type="color"] {
      width: 48px; height: 48px; padding: 3px; border-radius: 10px; flex: none;
    }
    .card-controls .color-row input[type="text"] {
      flex: 1; padding: 10px 14px; font-size: 13px; font-family: var(--font);
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm); color: var(--text);
    }
    .bg-options {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .bg-opt {
      width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
      border: 2.5px solid transparent; transition: border-color 0.2s;
    }
    .bg-opt.active { border-color: var(--primary); }
    .bg-opt.lavender { background: var(--gradient-1); }
    .bg-opt.warm { background: var(--gradient-2); }
    .bg-opt.mint { background: var(--gradient-3); }
    .bg-opt.pink { background: var(--gradient-4); }
    .bg-opt.ice { background: var(--gradient-midnight); }

    /* ===== Answer Card Preview ===== */
    .card-preview-wrapper {
      margin: 0 auto; max-width: 380px;
    }
    .answer-card {
      width: 100%; aspect-ratio: 9 / 16; border-radius: 20px;
      overflow: hidden; position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      font-family: var(--font);
      transition: background 0.3s;
      padding: 32px 28px;
      background: var(--gradient-1);
      color: #1F1F2D;
    }
    .answer-card .card-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .answer-card .card-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .answer-card .card-name {
      font-size: 15px; font-weight: 600;
    }
    .answer-card .card-subtitle {
      font-size: 11px; color: var(--text-light); margin-top: 1px;
    }
    .answer-card .card-decoration {
      position: absolute; top: 16px; right: 20px; opacity: 0.06;
      font-size: 64px; line-height: 1;
      color: var(--primary);
    }
    .answer-card .card-body {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      gap: 16px;
    }
    .answer-card .card-q {
      padding: 16px 18px; background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.04);
      border-radius: 14px; backdrop-filter: blur(8px);
    }
    .answer-card .card-q-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px; opacity: 0.6;
    }
    .answer-card .card-q-text {
      font-size: 15px; line-height: 1.7; font-weight: 500;
    }
    .answer-card .card-a {
      padding: 16px 18px; background: rgba(124,92,252,0.08);
      border: 1px solid rgba(124,92,252,0.12);
      border-radius: 14px; backdrop-filter: blur(8px);
    }
    .answer-card .card-a-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px; color: var(--primary-dark);
    }
    .answer-card .card-a-text {
      font-size: 14px; line-height: 1.8;
    }
    .answer-card .card-watermark {
      text-align: center; font-size: 11px; color: var(--text-muted);
      margin-top: 12px;
    }

    .card-actions {
      display: flex; gap: 10px; margin-top: 16px;
    }
    .card-actions .btn { margin-top: 0; }

    /* ===== Settings Page ===== */
    .settings-section { margin-bottom: 24px; }
    .settings-section h3 {
      font-size: 14px; font-weight: 600; color: var(--text-light); margin-bottom: 12px;
    }
    .settings-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--card-bg); border-radius: var(--radius);
      padding: 16px 18px; border: 1px solid var(--border);
      box-shadow: var(--card-shadow); margin-bottom: 8px;
    }
    .settings-row label { font-size: 14px; font-weight: 500; min-width: 70px; }
    .settings-row input {
      flex: 1; padding: 8px 12px; font-size: 14px; color: var(--text);
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: 8px;
    }
    .settings-row input:focus { border-color: var(--primary); background: #F0EEF5; }
    .settings-row .avatar-upload {
      width: 60px; height: 60px; border-radius: 50%; overflow: hidden;
      cursor: pointer; position: relative; flex: none;
    }
    .settings-row .avatar-upload img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .settings-row .avatar-upload .overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: white; opacity: 0; transition: opacity 0.2s;
    }
    .settings-row .avatar-upload:hover .overlay { opacity: 1; }
    .settings-row .avatar-upload input { display: none; }

    /* ===== Empty Pick ===== */
    .q-select-row {
      margin-bottom: 16px;
    }
    .q-select-row select {
      width: 100%; padding: 12px 14px; font-size: 14px; font-family: var(--font); color: var(--text);
      background: #F5F4F8; border: 1px solid transparent;
      border-radius: var(--radius-sm); cursor: pointer;
    }
    .q-select-row select:focus { border-color: var(--primary); }
    .q-select-row select optgroup { background: #F0EEF5; color: var(--text-light); }
    .q-select-row select option { background: white; color: var(--text); }

    /* ===== QR Modal ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 2000; backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 20px; padding: 32px 28px;
      max-width: 360px; width: 100%; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .modal h3 { font-size: 18px; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }
    .modal .qrcode-container {
      display: flex; justify-content: center; margin-bottom: 20px;
    }
    .modal .qrcode-container img { display: block; }
    .modal .share-url {
      font-size: 12px; color: var(--text-light); word-break: break-all;
      background: #F5F4F8; padding: 10px; border-radius: 8px;
      margin-bottom: 16px;
    }
    .modal .btn { margin-top: 0; }

    /* ===== Responsive ===== */
    @media (min-width: 520px) {
      body { padding: 20px 0 calc(var(--nav-height) + var(--safe-bottom) + 12px); }
      .bottom-nav { max-width: 520px; left: 50%; transform: translateX(-50%); border-radius: 20px 20px 0 0; }
    }
  </style>
</head>
<body>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== QR Modal ===== -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal">
      <h3>📱 扫码提问</h3>
      <p>分享这个二维码，让朋友扫码向你提问</p>
      <div class="qrcode-container" id="qrcodeContainer"></div>
      <div class="share-url" id="shareUrl">正在生成链接...</div>
      <button class="btn btn-sm" onclick="copyShareUrl()" style="margin-bottom:8px">📋 复制链接</button>
      <button class="btn btn-sm btn-outline" onclick="closeQrModal()">关闭</button>
    </div>
  </div>

  <!-- ===== PAGE: Ask ===== -->
  <div class="page active" id="page-ask">
    <div class="page-header" id="askPageHeader">
      <img class="avatar" id="askAvatar" src="avatar.jpg" alt="avatar" onclick="adminReveal()">
      <h1>白河愁的提问箱</h1>
      <p>匿名提问 · 随心回答</p>
    </div>

    <div class="ask-section">
      <div class="ask-card">
        <label>✏️ 你有什么想问我的？</label>
        <textarea id="askInput" placeholder="在这里写下你的问题……(支持匿名)"></textarea>
        <input type="text" id="askName" placeholder="你的名字（选填，匿名即显示「匿名」）">
        <button class="btn" onclick="submitQuestion()">✨ 发送提问</button>
      </div>
    </div>

    <div class="recent-title">📌 最近提问</div>
    <div id="publicQuestions"></div>
  </div>

  <!-- ===== PAGE: Admin ===== -->
  <div class="page" id="page-admin">
    <!-- Login -->
    <div class="admin-login" id="adminLogin">
      <div class="lock-icon">🔒</div>
      <h2>管理后台</h2>
      <p>请输入密码进入管理面板</p>
      <input type="password" id="adminPwd" placeholder="输入密码" onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="btn" onclick="adminLogin()">进入后台</button>
    </div>

    <!-- Dashboard -->
    <div class="admin-dashboard" id="adminDashboard">
      <div class="page-header" style="padding-bottom:16px">
        <h1 style="font-size:20px">📊 管理后台</h1>
        <p style="font-size:13px" id="adminSubtitle">管理你的提问箱</p>
      </div>

      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">全部</div></div>
        <div class="stat-card"><div class="num" id="statPending">0</div><div class="label">待回答</div></div>
        <div class="stat-card"><div class="num" id="statAnswered">0</div><div class="label">已回答</div></div>
      </div>

      <div class="admin-tabs">
        <div class="admin-tab active" data-filter="all" onclick="filterQuestions('all',this)">全部</div>
        <div class="admin-tab" data-filter="pending" onclick="filterQuestions('pending',this)">待回答</div>
        <div class="admin-tab" data-filter="answered" onclick="filterQuestions('answered',this)">已回答</div>
      </div>

      <div id="adminQuestionList"></div>

      <div style="margin-top:20px;display:flex;gap:8px">
        <button class="btn btn-sm btn-secondary" onclick="generateTestQuestion()">🔄 生成测试提问</button>
        <button class="btn btn-sm btn-outline" onclick="adminLogout()">🚪 退出</button>
      </div>
    </div>
  </div>

  <!-- ===== PAGE: Card Generator ===== -->
  <div class="page" id="page-card">
    <div class="page-header" style="padding-bottom:16px">
      <h1 style="font-size:20px">🎨 卡片工坊</h1>
      <p style="font-size:13px">生成 Q&A 卡片，截图发抖音</p>
    </div>

    <div class="q-select-row">
      <select id="cardQuestionSelect" onchange="onCardQuestionChange()">
        <option value="">— 请先选择要制作的提问 —</option>
      </select>
    </div>

    <div class="card-controls">
      <div class="bg-options" id="bgOptions">
        <div class="bg-opt lavender active" data-bg="lavender" onclick="selectBg('lavender',this)" title="薰衣草"></div>
        <div class="bg-opt warm" data-bg="warm" onclick="selectBg('warm',this)" title="暖阳"></div>
        <div class="bg-opt mint" data-bg="mint" onclick="selectBg('mint',this)" title="薄荷"></div>
        <div class="bg-opt pink" data-bg="pink" onclick="selectBg('pink',this)" title="粉彩"></div>
        <div class="bg-opt ice" data-bg="ice" onclick="selectBg('ice',this)" title="冰蓝"></div>
      </div>
      <div class="color-row">
        <input type="color" id="customColor" value="#F5E8FF" onchange="setCustomBg(this.value)">
        <input type="text" id="customColorText" placeholder="或输入颜色值 #..." onchange="setCustomBg(this.value)">
      </div>
    </div>

    <div class="card-preview-wrapper">
      <div class="answer-card" id="answerCard">
        <div class="card-decoration">✦</div>
        <div class="card-top">
          <img class="card-avatar" id="cardAvatar" src="avatar.jpg" alt="">
          <div>
            <div class="card-name" id="cardName">白河愁</div>
            <div class="card-subtitle">匿名提问箱</div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-q">
            <div class="card-q-label">✧ 提问</div>
            <div class="card-q-text" id="cardQText">选择左侧提问即可预览</div>
          </div>
          <div class="card-a">
            <div class="card-a-label">✦ 回答</div>
            <div class="card-a-text" id="cardAText">在这里写下你的回答……</div>
          </div>
        </div>
        <div class="card-watermark" id="cardWatermark">白河愁 · 匿名提问箱</div>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn btn-sm btn-secondary" onclick="downloadCard()">💾 下载卡片</button>
      <button class="btn btn-sm btn-outline" onclick="showQrModal()">📱 分享提问箱</button>
    </div>
  </div>

  <!-- ===== PAGE: Settings ===== -->
  <div class="page" id="page-settings">
    <div class="page-header" style="padding-bottom:16px">
      <h1 style="font-size:20px">⚙️ 设置</h1>
      <p style="font-size:13px">自定义你的提问箱</p>
    </div>

    <div class="settings-section">
      <h3>个人资料</h3>
      <div class="settings-row">
        <label>头像</label>
        <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
          <img id="settingsAvatar" src="avatar.jpg" alt="">
          <div class="overlay">📷</div>
          <input type="file" id="avatarInput" accept="image/*" onchange="changeAvatar(event)">
        </div>
      </div>
      <div class="settings-row">
        <label>昵称</label>
        <input type="text" id="settingsName" value="白河愁" onchange="saveSettings()">
      </div>
    </div>

    <div class="settings-section">
      <h3>安全</h3>
      <div class="settings-row">
        <label>密码</label>
        <input type="text" id="settingsPwd" value="admin123" onchange="saveSettings()">
      </div>
    </div>

    <div class="settings-section">
      <h3>数据</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-secondary" onclick="exportData()">📦 导出数据</button>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-sm btn-outline" onclick="if(confirm('确定要清空所有数据？'))clearAllData()">🗑️ 清空</button>
      </div>
    </div>
  </div>

  <!-- ===== Bottom Nav ===== -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-page="ask" onclick="navigate('ask')">
      <span class="nav-icon">✉️</span>
      <span>提问</span>
    </div>
    <div class="nav-item" data-page="card" onclick="navigate('card')">
      <span class="nav-icon">🎨</span>
      <span>卡片</span>
    </div>
    <div class="nav-item admin-only" data-page="admin" onclick="navigate('admin')" style="display:none">
      <span class="nav-icon">📋</span>
      <span>管理</span>
    </div>
    <div class="nav-item admin-only" data-page="settings" onclick="navigate('settings')" style="display:none">
      <span class="nav-icon">⚙️</span>
      <span>设置</span>
    </div>
  </nav>

  <script>
    // ============================================================
    //  API LAYER
    // ============================================================

    const API_BASE = '';

    let state = {
      questions: [],
      name: '白河愁',
      password: 'admin123',
      cardBg: 'lavender',
      cardCustomColor: '#F5E8FF',
    };

    let adminToken = sessionStorage.getItem('askbox_admin_token') || '';
    let adminRevealCount = 0;

    function adminReveal() {
      adminRevealCount++;
      if (adminRevealCount >= 5) {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
        document.getElementById('askPageHeader').querySelector('p').textContent = '👤 管理入口已解锁';
        adminRevealCount = 0;
        setTimeout(() => {
          document.getElementById('askPageHeader').querySelector('p').textContent = '匿名提问 · 随心回答';
        }, 3000);
      }
    }

    function showAdminNav() {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
    }

    function hideAdminNav() {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    }

    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (adminToken) headers['admin-token'] = adminToken;
      try {
        const r = await fetch(API_BASE + path, { ...options, headers });
        return await r.json();
      } catch (e) {
        return { error: '网络错误' };
      }
    }

    async function initApp() {
      const settings = await api('/api/settings');
      if (settings.name) {
        state.name = settings.name;
        state.cardBg = settings.cardBg || 'lavender';
        state.cardCustomColor = settings.cardCustomColor || '#F5E8FF';
        applySettings();
      }
      renderPublicQuestions();
      populateCardSelect();
    }

    // ============================================================
    //  NAVIGATION
    // ============================================================

    function navigate(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector('.nav-item[data-page="' + page + '"]').classList.add('active');
      if (page === 'ask') renderPublicQuestions();
      if (page === 'admin') renderAdminList();
      if (page === 'card') populateCardSelect();
    }

    // ============================================================
    //  TOAST
    // ============================================================

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ============================================================
    //  PAGE: ASK - Submit Questions
    // ============================================================

    async function submitQuestion() {
      const input = document.getElementById('askInput');
      const nameInput = document.getElementById('askName');
      const text = input.value.trim();
      if (!text) { showToast('请输入你的问题 😅'); return; }

      const res = await api('/api/questions', {
        method: 'POST',
        body: JSON.stringify({ text, name: nameInput.value.trim() || '匿名' }),
      });
      if (res.success) {
        input.value = '';
        nameInput.value = '';
        showToast('✅ 提问已发送！');
        renderPublicQuestions();
      } else {
        showToast(res.error || '发送失败');
      }
    }

    async function renderPublicQuestions() {
      const container = document.getElementById('publicQuestions');
      const res = await api('/api/questions/public');
      const list = res.questions || [];
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">💭</div><p>还没有提问，来做第一个吧！</p></div>';
        return;
      }
      container.innerHTML = list.map(q => {
        const timeStr = formatTime(q.time);
        return `
          <div class="public-q-item">
            <div class="q-text">${escHtml(q.text)}</div>
            <div class="q-meta">
              <span>— ${escHtml(q.name)}</span>
              <span>
                ${q.answered ? '<span class="q-tag answered">已回复</span>' : '<span class="q-tag">待回复</span>'}
                · ${timeStr}
              </span>
            </div>
          </div>
        `;
      }).join('');
    }

    // ============================================================
    //  PAGE: ADMIN
    // ============================================================

    async function adminLogin() {
      const pwd = document.getElementById('adminPwd').value;
      const res = await api('/api/admin/login', {
        method: 'POST',
        body: JSON.stringify({ password: pwd }),
      });
      if (res.success) {
        adminToken = pwd;
        sessionStorage.setItem('askbox_admin_token', pwd);
        state.password = pwd;
        document.getElementById('adminLogin').style.display = 'none';
        document.getElementById('adminDashboard').classList.add('active');
        showAdminNav();
        await refreshState();
        renderAdminList();
        showToast('欢迎回来 👋');
      } else {
        showToast('密码错误 🔒');
      }
    }

    function adminLogout() {
      adminToken = '';
      sessionStorage.removeItem('askbox_admin_token');
      document.getElementById('adminLogin').style.display = 'flex';
      document.getElementById('adminDashboard').classList.remove('active');
      document.getElementById('adminPwd').value = '';
      hideAdminNav();
      navigate('ask');
    }

    async function refreshState() {
      const res = await api('/api/admin/questions');
      if (res.questions) {
        state.questions = res.questions;
        state.name = res.name;
        state.cardBg = res.cardBg || 'lavender';
        state.cardCustomColor = res.cardCustomColor || '#F5E8FF';
      }
    }

    let currentFilter = 'all';

    function filterQuestions(filter, el) {
      currentFilter = filter;
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
      renderAdminList();
    }

    async function renderAdminList() {
      if (!state.questions.length && adminToken) await refreshState();

      const total = state.questions.length;
      const pending = state.questions.filter(q => !q.answered).length;
      const answered = state.questions.filter(q => q.answered).length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statAnswered').textContent = answered;
      document.getElementById('adminSubtitle').textContent = `共 ${total} 条提问 · ${pending} 条待回复`;

      const container = document.getElementById('adminQuestionList');
      let list = state.questions;
      if (currentFilter === 'pending') list = list.filter(q => !q.answered);
      if (currentFilter === 'answered') list = list.filter(q => q.answered);

      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无提问</p></div>';
        return;
      }

      container.innerHTML = list.map(q => {
        const timeStr = formatTime(q.time);
        const statusClass = q.answered ? 'answered' : 'pending';
        const statusText = q.answered ? '✅ 已回复' : '⏳ 待回复';
        return `
          <div class="q-item ${q.answered ? 'answered' : ''}" data-id="${q.id}" onclick="toggleExpand(${q.id})">
            <div class="q-header">
              <div>
                <div class="q-text">${escHtml(q.text)}</div>
                <div class="q-name">— ${escHtml(q.name)} · ${timeStr}</div>
              </div>
              <span class="q-status ${statusClass}">${statusText}</span>
            </div>
            ${q.answered ? `<div class="q-answer"><div class="q-answer-label">💬 你的回答</div>${escHtml(q.answer)}</div>` : ''}
            <div class="q-actions">
              <textarea id="answerInput_${q.id}" placeholder="写下你的回答……">${q.answer || ''}</textarea>
              <div class="btn-row">
                <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();saveAnswer(${q.id})">💾 保存回答</button>
                <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();deleteQuestion(${q.id})">🗑️ 删除</button>
                <button class="btn btn-sm" style="background:var(--primary);color:white" onclick="event.stopPropagation();saveAndMakeCard(${q.id})">🎨 制作卡片</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleExpand(id) {
      const el = document.querySelector(`.q-item[data-id="${id}"]`);
      if (el) el.classList.toggle('expanded');
    }

    async function saveAnswer(id) {
      const input = document.getElementById('answerInput_' + id);
      const answer = input.value.trim();
      if (!answer) { showToast('请输入回答内容 😅'); return; }
      const res = await api('/api/admin/questions/' + id + '/answer', {
        method: 'POST',
        body: JSON.stringify({ answer }),
      });
      if (res.success) {
        showToast('✅ 回答已保存');
        await refreshState();
        renderAdminList();
      } else {
        showToast(res.error || '保存失败');
      }
    }

    async function deleteQuestion(id) {
      if (!confirm('确定删除这条提问？')) return;
      const res = await api('/api/admin/questions/' + id, { method: 'DELETE' });
      if (res.success) {
        await refreshState();
        renderAdminList();
        showToast('🗑️ 已删除');
      }
    }

    function saveAndMakeCard(id) {
      const input = document.getElementById('answerInput_' + id);
      const answer = input.value.trim();
      if (!answer) { showToast('请先写下回答再制作卡片 😅'); return; }
      const q = state.questions.find(q => q.id === id);
      if (q) { q.answer = answer; q.answered = true; }
      api('/api/admin/questions/' + id + '/answer', {
        method: 'POST',
        body: JSON.stringify({ answer }),
      });
      renderAdminList();
      navigate('card');
      const select = document.getElementById('cardQuestionSelect');
      setTimeout(() => {
        select.value = id;
        onCardQuestionChange();
      }, 100);
    }

    async function generateTestQuestion() {
      const prompts = [
        "为什么人总在深夜最清醒？",
        "你觉得爱是本能还是选择？",
        "有没有一句话，让你突然释怀了？",
        "你相信「对的人」会出现吗？",
        "如何接受一段关系的结束？",
        "人长大是从学会闭嘴开始的吗？",
        "你是怎么和自己和解的？",
        "如果有机会对过去的自己说句话，你会说什么？",
        "你会在什么时候感到孤独？",
        "努力了也没有结果，还要继续吗？",
        "你觉得理性的人更痛苦还是感性的人更痛苦？",
        "你怀念的到底是一个人，还是一段时光？",
      ];
      const randomName = ['北极星', '夜航船', '匿名者', '失眠患者', '过路人', '坠落星辰', '雾中人', '风的旅人'].sort(() => Math.random() - 0.5)[0];
      const res = await api('/api/questions', {
        method: 'POST',
        body: JSON.stringify({
          text: prompts[Math.floor(Math.random() * prompts.length)],
          name: randomName,
        }),
      });
      if (res.success) {
        await refreshState();
        renderAdminList();
        showToast('✨ 生成了一条测试提问');
      }
    }

    // ============================================================
    //  PAGE: CARD GENERATOR
    // ============================================================

    function populateCardSelect() {
      const select = document.getElementById('cardQuestionSelect');
      const answered = state.questions.filter(q => q.answered && q.answer.trim());
      const pending = state.questions.filter(q => !q.answered);
      let html = '<option value="">— 选择一条提问 —</option>';
      if (answered.length) {
        html += '<optgroup label="✅ 已回答">';
        answered.forEach(q => {
          const preview = q.text.length > 30 ? q.text.slice(0, 30) + '…' : q.text;
          html += `<option value="${q.id}">${escHtml(preview)}</option>`;
        });
        html += '</optgroup>';
      }
      if (pending.length) {
        html += '<optgroup label="⏳ 待回答">';
        pending.forEach(q => {
          const preview = q.text.length > 30 ? q.text.slice(0, 30) + '…' : q.text;
          html += `<option value="${q.id}">${escHtml(preview)}</option>`;
        });
        html += '</optgroup>';
      }
      select.innerHTML = html;
    }

    let currentBg = 'lavender';
    const bgMap = {
      lavender: 'linear-gradient(135deg, #F5E8FF 0%, #E8F0FF 100%)',
      warm: 'linear-gradient(135deg, #FFF0E8 0%, #FFE8F0 100%)',
      mint: 'linear-gradient(135deg, #E8FFEE 0%, #E8F5FF 100%)',
      pink: 'linear-gradient(135deg, #F0E8FF 0%, #FFE8F5 100%)',
      ice: 'linear-gradient(135deg, #E8EFFF 0%, #F5E8FF 100%)',
    };

    function selectBg(name, el) {
      currentBg = name;
      document.querySelectorAll('.bg-opt').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      state.cardBg = name;
      applyCardBg();
    }

    function setCustomBg(color) {
      currentBg = 'custom';
      document.querySelectorAll('.bg-opt').forEach(b => b.classList.remove('active'));
      state.cardCustomColor = color;
      document.getElementById('customColorText').value = color;
      state.cardBg = 'custom';
      applyCardBg();
    }

    function applyCardBg() {
      const card = document.getElementById('answerCard');
      if (currentBg === 'custom') {
        card.style.background = state.cardCustomColor || '#F5E8FF';
      } else {
        card.style.background = bgMap[currentBg] || bgMap.lavender;
      }
    }

    function onCardQuestionChange() {
      const select = document.getElementById('cardQuestionSelect');
      const id = parseInt(select.value);
      if (!id) {
        document.getElementById('cardQText').textContent = '选择左侧提问即可预览';
        document.getElementById('cardAText').textContent = '在这里写下你的回答……';
        return;
      }
      const q = state.questions.find(q => q.id === id);
      if (q) {
        document.getElementById('cardQText').textContent = q.text;
        if (q.answered && q.answer) {
          document.getElementById('cardAText').textContent = q.answer;
        } else {
          document.getElementById('cardAText').textContent = '（待回答）';
        }
      }
    }

    function downloadCard() {
      const card = document.getElementById('answerCard');
      const select = document.getElementById('cardQuestionSelect');
      if (!select.value) { showToast('请先选择一条提问 🎨'); return; }
      const text = document.getElementById('cardQText').textContent;
      if (text === '选择左侧提问即可预览') { showToast('请先选择一条提问 🎨'); return; }

      showToast('🎨 正在生成卡片…');

      html2canvas(card, {
        scale: 2.5,
        backgroundColor: null,
        useCORS: true,
        allowTaint: true,
        logging: false,
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = '提问箱卡片_' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('✅ 卡片已下载！');
      }).catch(err => {
        console.error(err);
        showToast('生成失败，试试截图吧 📸');
      });
    }

    // ============================================================
    //  QR MODAL
    // ============================================================

    function showQrModal() {
      const modal = document.getElementById('qrModal');
      modal.classList.add('show');

      const container = document.getElementById('qrcodeContainer');
      container.innerHTML = '';

      const url = window.location.href.split('#')[0] + (window.location.href.includes('#') ? '' : '');
      document.getElementById('shareUrl').textContent = url;

      try {
        new QRCode(container, {
          text: url,
          width: 200,
          height: 200,
          colorDark: '#1F1F2D',
          colorLight: '#FFFFFF',
          correctLevel: QRCode.CorrectLevel.H,
        });
      } catch(e) {
        setTimeout(() => {
          container.innerHTML = '';
          new QRCode(container, { text: url, width: 200, height: 200 });
        }, 100);
      }
    }

    function closeQrModal() {
      document.getElementById('qrModal').classList.remove('show');
    }

    function copyShareUrl() {
      const url = document.getElementById('shareUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        showToast('📋 已复制链接');
      }).catch(() => {
        const el = document.createElement('textarea');
        el.value = url;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast('📋 已复制链接');
      });
    }

    document.getElementById('qrModal').addEventListener('click', function(e) {
      if (e.target === this) closeQrModal();
    });

    // ============================================================
    //  PAGE: SETTINGS
    // ============================================================

    function changeAvatar(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const url = e.target.result;
        document.getElementById('settingsAvatar').src = url;
        document.getElementById('askAvatar').src = url;
        document.getElementById('cardAvatar').src = url;
        state._avatarDataUrl = url;
        showToast('✅ 头像已更新（仅本地）');
      };
      reader.readAsDataURL(file);
    }

    async function saveSettings() {
      const name = document.getElementById('settingsName').value.trim() || '白河愁';
      const pwd = document.getElementById('settingsPwd').value.trim() || 'admin123';

      const res = await api('/api/admin/settings', {
        method: 'PUT',
        body: JSON.stringify({
          name,
          password: pwd !== adminToken ? pwd : undefined,
          cardBg: state.cardBg,
          cardCustomColor: state.cardCustomColor,
        }),
      });

      if (res.success) {
        state.name = name;
        if (pwd !== adminToken) state.password = pwd;
        adminToken = pwd;
        sessionStorage.setItem('askbox_admin_token', pwd);
        applySettings();
        showToast('✅ 设置已保存');
      } else {
        showToast(res.error || '保存失败');
      }
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state.questions, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '提问箱数据_' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('📦 数据已导出');
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            state.questions = imported;
            showToast('✅ JSON 已加载到本地预览');
          } else {
            showToast('❌ 文件格式不对，请导出完整数据');
          }
        } catch(e) {
          showToast('❌ 文件解析失败');
        }
      };
      reader.readAsText(file);
    }

    function clearAllData() {
      if (!confirm('确定要清空所有数据？此操作不可撤销！')) return;
      showToast('请在管理后台逐条删除，或直接操作服务器 data/db.json 文件');
    }

    // ============================================================
    //  HELPERS
    // ============================================================

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      if (diff < 172800000) return '昨天';
      return (d.getMonth() + 1) + '月' + d.getDate() + '日';
    }

    function applySettings() {
      document.querySelectorAll('.card-name').forEach(el => el.textContent = state.name);
      document.querySelectorAll('.page-header h1').forEach(el => {
        if (el.textContent.includes('提问箱')) el.textContent = state.name + ' · 提问箱';
      });
      document.getElementById('cardWatermark').textContent = state.name + ' · 匿名提问箱';
      document.getElementById('settingsName').value = state.name;
      document.getElementById('settingsPwd').value = state.password;

      if (state._avatarDataUrl) {
        document.querySelectorAll('img[id$="Avatar"], img.avatar').forEach(img => {
          img.src = state._avatarDataUrl;
        });
      }

      if (state.cardBg && state.cardBg !== 'custom') {
        currentBg = state.cardBg;
        document.querySelectorAll('.bg-opt').forEach(b => {
          b.classList.toggle('active', b.dataset.bg === state.cardBg);
        });
      } else if (state.cardBg === 'custom' && state.cardCustomColor) {
        currentBg = 'custom';
        document.getElementById('customColor').value = state.cardCustomColor;
        document.getElementById('customColorText').value = state.cardCustomColor;
      }
      applyCardBg();
    }

    // ============================================================
    //  INIT
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
      applySettings();
      initApp();

      // Restore admin session if token exists
      if (adminToken) {
        fetch(API_BASE + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminToken }),
        })
        .then(r => r.json())
        .then(res => {
          if (res.success) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminDashboard').classList.add('active');
            showAdminNav();
            refreshState().then(() => renderAdminList());
          } else {
            adminToken = '';
            sessionStorage.removeItem('askbox_admin_token');
          }
        });
      }
    });
  </script>
</body>
</html>
